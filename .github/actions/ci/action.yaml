name: CI
description: Runs Continuous Integration checks
runs:
    using: composite
    steps:
        - name: Set up tools
          uses: dnd-mapp/.github/.github/actions/setup-tools@9a4924a69aa8b6c62d5cb35240ed4fa00c979c6d

        - name: Check formatting
          shell: bash
          run: pnpm format:check

        - name: Run linting
          shell: bash
          run: pnpm lint

        - name: Run tests
          shell: bash
          run: pnpm test

        - name: Compile library
          shell: bash
          run: pnpm build
