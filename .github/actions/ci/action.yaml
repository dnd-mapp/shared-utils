name: CI
description: Runs Continuous Integration checks
runs:
    using: composite
    steps:
        - name: Set up tools
          uses: dnd-mapp/.github/.github/actions/setup-tools@7fffad2b1d5c80dc6ecf21ff7318dcc17e6e1527

        - name: Check formatting
          shell: bash
          run: pnpm format:check

        - name: Run linting
          shell: bash
          run: pnpm lint

        - name: Run tests
          shell: bash
          run: pnpm test

        - name: Compile library
          shell: bash
          run: pnpm build
