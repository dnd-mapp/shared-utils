        branches:
            - main
            - 'release/**'
permissions:
    contents: write
jobs:
    publish-release:
        uses: dnd-mapp/.github/.github/workflows/publish-release.yaml@606b994c48a596aa4ec65f40ba9032f5289dd055
        secrets:
