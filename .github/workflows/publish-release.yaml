name: Publish release
on:
    push:
        branches:
            - main
            - 'release/**'
permissions:
    contents: write
jobs:
    publish-release:
        uses: dnd-mapp/.github/.github/workflows/publish-release.yaml@c78632d4e2a58932d57a301542d1ecd5ae9c8258
        secrets:
            app-id: ${{ secrets.AUTH_APP_ID }}
            app-private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}
