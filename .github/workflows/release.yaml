name: Release
on:
    workflow_dispatch:
        inputs:
            version:
                description: The version to release
                required: true
                type: choice
                options:
                    - major
                    - minor
                    - patch
                    - premajor
                    - preminor
                    - prepatch
                    - prerelease
            prerelease-id:
                description: The ID of the prerelease
                type: choice
                default: none
                options:
                    - none
                    - alpha
                    - beta
                    - rc
permissions:
    contents: write
jobs:
    release:
        uses: dnd-mapp/.github/.github/workflows/release.yaml@009a3203e96cba5d053d75f944d5f6ffe4294c76
        with:
            version: ${{ inputs.version }}
            prerelease-id: ${{ inputs.prerelease-id }}
        secrets:
            app-id: ${{ secrets.AUTH_APP_ID }}
            app-private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}
